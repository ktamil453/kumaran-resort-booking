<html>
<head>
  <title>
    Review
  </title>
</head>  
<body>
    <style>
        body{
            background-image: url(pine.jpg);
        }
        
        .flav-biriyani{
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .flv-biri{
            background-color: rgb(12, 12, 12);
            border-radius: 20px;
            box-shadow: 10px;
            width: 200px;
            padding: 20px;
            text-align: center;
            color: rgb(15, 15, 15);
            transition: transform 0.3s ease,box shadow 0.3s ease;
            border: 2px;
        }
        .fav-biri:hover{
            transform: scale();
            box-shadow: 0 8px 16px;
        }
        .flv-biri img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
    </style>

    <section id="biriyani" class="flavors">
        <h1>Customer Review</h1>
        <div class="flav-biriyani">
            <div class="flv-biri">
                <img src="star.jpg">
                <h2>customer 1 </h2>
                <p> we really loves your place its feels like home</p>
            </div>
            <div class="flv-biri">
                <img src="star.jpg">
                <h2>customer 2</h2>
                <p> good and clean rooms with good hospitality</p>
            </div>
            <div class="flv-biri">
                <img src="star.jpg">
                <h2>customer 3</h2>
                <p> best in the city i enjoyed lot</p>
            </div>
            <div class="flv-biri">
                <img src="star.jpg">
                <h2>customer 4</h2>
                <p> quite and calm place to stay </p>
            </div>

        </div>
    </section>
</body>
</html>
